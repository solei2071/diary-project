<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Daily Flow Diary</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
        background: #f8fafc;
        color: #111827;
      }
      .wrap {
        text-align: center;
        padding: 2rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.4rem;
      }
      p {
        margin: 0;
        color: #4b5563;
        line-height: 1.4;
      }
      button {
        margin-top: 1rem;
        border: 0;
        border-radius: 8px;
        background: #2383e2;
        color: #fff;
        padding: 0.5rem 0.8rem;
        font-size: 0.9rem;
      }
      .small {
        margin-top: 0.8rem;
        font-size: 0.8rem;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>You're offline</h1>
      <p>Please check your internet connection and try again.</p>
      <p class="small">
        You can still open the app features you visited before while connection is restored.
      </p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
