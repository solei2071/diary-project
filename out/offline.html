<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>오프라인 - Daily Flow Diary</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 0 max(1rem, env(safe-area-inset-right, 0px)) max(1rem, env(safe-area-inset-bottom, 0px)) max(1rem, env(safe-area-inset-left, 0px));
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
        background: #f5f7ff;
        color: #111827;
      }
      .wrap {
        text-align: center;
        padding: 2rem;
        background: #ffffff;
        border: 1px solid #dbeafe;
        border-radius: 16px;
        box-shadow: 0 20px 50px rgba(30, 64, 175, 0.1);
        max-width: 440px;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.4rem;
      }
      p {
        margin: 0;
        color: #374151;
        line-height: 1.4;
      }
      button {
        margin-top: 1rem;
        border: 0;
        border-radius: 8px;
        background: #2383e2;
        color: #fff;
        padding: 0.5rem 0.8rem;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
      }
      .small {
        margin-top: 0.8rem;
        font-size: 0.8rem;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>현재 오프라인입니다</h1>
      <p>인터넷 연결이 불안정합니다. 네트워크가 복구되면 다시 시도하세요.</p>
      <p class="small">
        이전에 열었던 화면은 오프라인일 때도 바로가기에서 다시 확인할 수 있습니다.
      </p>
      <button onclick="location.reload()">다시 시도</button>
    </div>
  </body>
</html>
